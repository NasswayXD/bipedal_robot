decimation: 4 #200 Hz
sim:
  dt: 0.005
  render_interval: 4
  gravity: !!python/tuple
  - 0.0
  - 0.0
  - -9.81
  physx:
    solver_type: 1
    min_position_iteration_count: 1
    max_position_iteration_count: 255
    min_velocity_iteration_count: 0
    max_velocity_iteration_count: 255
    enable_ccd: false
    enable_stabilization: true
scene:
  robot:
    spawn:
      articulation_props:
        enabled_self_collisions: false
        solver_position_iteration_count: 8
        solver_velocity_iteration_count: 1
        sleep_threshold: 0.005
        stabilization_threshold: 0.001
    init_state:
      joint_pos:
        hip_one_right_joint: 0.0
        hip_two_right_joint: 0.0
        hip_leg_right_joint: -0.4
        knee_leg_right_joint: 0.95
        ankle_leg_right_joint: -0.55
        hip_one_left_joint: 0.0
        hip_two_left_joint: 0.0
        hip_leg_left_joint: 0.4
        knee_leg_left_joint: -0.95
        ankle_leg_left_joint: 0.55
      joint_vel:
        .*: 0.0
    actuators:
      legs:
        joint_names_expr:
        - hip_one_right_joint
        - hip_two_right_joint
        - hip_leg_right_joint
        - knee_leg_right_joint
        - hip_one_left_joint
        - hip_two_left_joint
        - hip_leg_left_joint
        - knee_leg_left_joint
        effort_limit: 2.0
        velocity_limit: 6.28
        stiffness: 40.0
        damping: 2.0
      ankles: # ankles a bit softer 
        joint_names_expr:
        - ankle_leg_right_joint
        - ankle_leg_left_joint
        effort_limit: 2.0
        velocity_limit: 6.28
        stiffness: 20.0
        damping: 2.0
